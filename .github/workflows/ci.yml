name: CI Gatekeeper

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # This prevents pnpm from panicking when it can't find a root package.json
      NPM_CONFIG_IGNORE_WORKSPACE_ROOT_CHECK: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install Dependencies
        run: |
          cd backend && pnpm install --frozen-lockfile
          cd ../frontend && pnpm install --frozen-lockfile

      - name: Build Next.js Backend
        run: |
          if git diff --quiet HEAD^ HEAD ./backend; then
            echo "No changes in backend. Skipping..."
          else
            cd backend && pnpm run build
          fi

      - name: Build Vite Frontend
        run: |
          if git diff --quiet HEAD^ HEAD ./frontend; then
            echo "No changes in frontend. Skipping..."
          else
            cd frontend && pnpm run build
          fi
