name: CI Gatekeeper

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          # Since have two pnpm-lock, using a wildcard is safer
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install Dependencies
        # Since pnpm is being used in subdirectories, run install for both
        run: |
          pnpm install --frozen-lockfile --prefix backend
          pnpm install --frozen-lockfile --prefix frontend

      - name: Build Next.js Backend
        run: |
          if git diff --quiet HEAD^ HEAD ./backend; then
            echo "No changes in backend. Skipping..."
          else
            pnpm run build --prefix backend
          fi

      - name: Build Vite Frontend
        run: |
          if git diff --quiet HEAD^ HEAD ./frontend; then
            echo "No changes in frontend. Skipping..."
          else
            # Corrected prefix to match your folder name
            pnpm run build --prefix frontend
          fi
